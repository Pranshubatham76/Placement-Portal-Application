{% extends "base.html" %}

{% block title %}Login - Placement Portal{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <h2>
            <i class="bi bi-mortarboard-fill text-primary"></i>
            Login
          </h2>
          <p class="text-muted">Access your placement portal account</p>
        </div>

        <form method="POST" action="{{ url_for('auth.login') }}">
          <div class="mb-3">
            <label for="email" class="form-label">Email Address</label>
            <div class="input-group">
              <span class="input-group-text">
                <i class="bi bi-envelope"></i>
              </span>
              <input type="email" class="form-control" id="email" name="email" required>
            </div>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <div class="input-group">
              <span class="input-group-text">
                <i class="bi bi-lock"></i>
              </span>
              <input type="password" class="form-control" id="password" name="password" required>
            </div>
          </div>

          <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="remember" name="remember">
            <label class="form-check-label" for="remember">Remember me</label>
          </div>

          <button type="submit" class="btn btn-primary w-100 mb-3">
            <i class="bi bi-box-arrow-in-right"></i> Login
          </button>

          <div class="text-center">
            <a href="{{ url_for('auth.forget_password_route') }}" class="text-decoration-none">
              Forgot password?
            </a>
          </div>
        </form>

        <hr class="my-4">

        <div class="text-center">
          <p class="mb-2">Don't have an account?</p>
          <a href="{{ url_for('auth.register') }}" class="btn btn-outline-primary me-2">
            <i class="bi bi-person-plus"></i> Student Registration
          </a>
          <a href="{{ url_for('auth.register_company_route') }}" class="btn btn-outline-success">
            <i class="bi bi-building"></i> Company Registration
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
