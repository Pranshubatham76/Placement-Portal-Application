{% extends "base.html" %}

{% block title %}Student Registration - Placement Portal{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <h2>
            <i class="bi bi-person-plus text-primary"></i>
            Student Registration
          </h2>
          <p class="text-muted">Create your student account</p>
        </div>

        <form method="POST" action="{{ url_for('auth.register') }}">
          <div class="mb-3">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" class="form-control" id="email" name="email" required>
            <small class="text-muted">Use your official college email</small>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password" required minlength="8">
            <small class="text-muted">Minimum 8 characters</small>
          </div>

          <div class="mb-3">
            <label for="confirm_password" class="form-label">Confirm Password</label>
            <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
          </div>

          <button type="submit" class="btn btn-primary w-100 mb-3">
            <i class="bi bi-check-circle"></i> Register
          </button>
        </form>

        <div class="text-center">
          <p class="mb-0">
            Already have an account?
            <a href="{{ url_for('auth.login') }}">Login here</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
