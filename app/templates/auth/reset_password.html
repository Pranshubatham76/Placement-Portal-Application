{% extends "base.html" %}

{% block title %}Reset Password - Placement Portal{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2>
                        <i class="bi bi-shield-lock-fill text-primary"></i>
                        Reset Password
                    </h2>
                    <p class="text-muted">Enter the OTP sent to your email and your new password</p>
                </div>

                <form method="POST" action="{{ url_for('auth.reset_password_route') }}">
                    <div class="mb-3">
                        <label for="otp" class="form-label">One Time Password (OTP)</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-123"></i>
                            </span>
                            <input type="text" class="form-control" id="otp" name="otp" required
                                placeholder="Enter 6-digit OTP" maxlength="6" pattern="\d*">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="new_password" class="form-label">New Password</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-lock"></i>
                            </span>
                            <input type="password" class="form-control" id="new_password" name="new_password" required
                                minlength="8" placeholder="Minimum 8 characters">
                        </div>
                        <small class="text-muted">Must contain uppercase, number, and special character.</small>
                    </div>

                    <div class="mb-4">
                        <label for="confirm_password" class="form-label">Confirm New Password</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-lock-fill"></i>
                            </span>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                                required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <i class="bi bi-check-circle"></i> Reset Password
                    </button>
                </form>

                <div class="text-center mt-3">
                    <small class="text-muted">didn't receive otp?</small> <a
                        href="{{ url_for('auth.forget_password_route') }}" class="text-decoration-none">Resend</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
