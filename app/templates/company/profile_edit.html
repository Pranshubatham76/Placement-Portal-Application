{% extends "base.html" %}

{% block title %}Edit Profile - Company{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h1 class="mb-4">
            <i class="bi bi-pencil"></i> Edit Company Profile
        </h1>
    </div>
</div>

<div class="row">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <form method="POST" action="{{ url_for('company.edit_profile') }}">
                    <h5 class="mb-3">Company Information</h5>

                    <div class="mb-3">
                        <label for="company_name" class="form-label">Company Name *</label>
                        <input type="text" class="form-control" id="company_name" name="company_name"
                            value="{{ company.company_name }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="website" class="form-label">Website</label>
                        <input type="url" class="form-control" id="website" name="website"
                            value="{{ company.website or '' }}">
                    </div>

                    <div class="mb-3">
                        <label for="address" class="form-label">Address</label>
                        <textarea class="form-control" id="address" name="address"
                            rows="2">{{ company.address or '' }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Company Description</label>
                        <textarea class="form-control" id="description" name="description"
                            rows="4">{{ company.description or '' }}</textarea>
                    </div>

                    <hr>

                    <h5 class="mb-3">HR Contact Details</h5>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="hr_name" class="form-label">HR Name *</label>
                            <input type="text" class="form-control" id="hr_name" name="hr_name"
                                value="{{ company.hr_name }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="hr_email" class="form-label">HR Email *</label>
                            <input type="email" class="form-control" id="hr_email" name="hr_email"
                                value="{{ company.hr_email }}" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="hr_contact" class="form-label">HR Contact Number *</label>
                        <input type="tel" class="form-control" id="hr_contact" name="hr_contact"
                            value="{{ company.hr_contact }}" pattern="[0-9]{10}" required>
                        <small class="text-muted">10 digit number without spaces</small>
                    </div>

                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle"></i> Save Changes
                        </button>
                        <a href="{{ url_for('company.profile') }}" class="btn btn-secondary">
                            <i class="bi bi-x-circle"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
